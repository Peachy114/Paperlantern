<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/site.webmanifest" />
        <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>laterncomix | Webtoons & Novels</title>

        <!-- SEO Meta Tags -->
        <meta
            name="description"
            content="laterncomix is a digital platform for webtoons and novels, where readers can explore original stories, discover new series, and enjoy immersive storytelling."
        />
        <meta
            name="keywords"
            content="laterncomix, webtoons, online comics, novels, digital manga, web novels, fiction stories, fantasy comics, romance webtoon, read webtoons online, indie authors, storytelling platform"
        />
        <meta
            name="robots"
            content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
        />
        <meta name="author" content="DevOrbit Studio" />

        <!-- Open Graph (for social sharing) -->
        <meta property="og:title" content="laterncomix | Webtoons & Novels" />
        <meta
            property="og:description"
            content="Read captivating webtoons and web novels on laterncomix."
        />
        <meta property="og:image" content="https://laterncomix.com/og-image-v2.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:type" content="image/png" />
        <meta property="og:url" content="https://laterncomix.com/" />
        <meta property="og:type" content="website" />

        <!-- Canonical URL -->
        <link rel="canonical" href="https://laterncomix.com/" />

        <!-- FONTS -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="preload"
            as="style"
            href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Kalam:wght@400;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"

                href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Kalam:wght@400;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
